name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  php:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
      - run: composer validate --strict
      - run: find src examples Scripts -name '*.php' -print0 | xargs -0 -n1 php -l
